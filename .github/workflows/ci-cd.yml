name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd devangwabackend
        pip install -r requirements.txt

    - name: Run Django checks
      env:
        SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: 'True'
      run: |
        cd devangwabackend
        python manage.py check

    - name: Run Django migrations
      env:
        SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: 'True'
      run: |
        cd devangwabackend
        python manage.py migrate

    - name: Run Django tests
      env:
        SECRET_KEY: ci-test-secret-key-not-for-production
        DEBUG: 'True'
      run: |
        cd devangwabackend
        python manage.py test

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install frontend dependencies
      run: |
        cd devangwacoaching
        npm ci || npm install

    - name: Build frontend
      run: |
        cd devangwacoaching
        npm run build

    - name: Lint frontend
      run: |
        cd devangwacoaching
        npm run lint

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -f devangwabackend/Dockerfile -t devangwa-app .
